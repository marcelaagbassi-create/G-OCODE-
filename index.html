<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OtAkU+ Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        #game-area { display: none; border: 2px solid #333; padding: 20px; margin: 20px; }
        .active-turn { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login">
        <h1>OtAkU+ Game Console</h1>
        <input type="text" id="username" placeholder="Pseudo">
        <input type="text" id="room" placeholder="Code Salon">
        <button onclick="join()">Rejoindre</button>
    </div>

    <div id="game-area">
        <h2 id="room-title"></h2>
        <p id="turn-display">En attente d'autres joueurs...</p>
        <div id="player-list"></div>
        <hr>
        <input type="text" id="action-input" placeholder="Ton action...">
        <button id="send-btn" onclick="sendAction()" disabled>Envoyer l'action</button>
        <button id="start-btn" onclick="startGame()">Lancer la partie</button>
        <div id="log" style="margin-top: 20px; color: #aaa;"></div>
    </div>

    <script>
        const socket = io();
        let myName, myRoom;

        function join() {
            myName = document.getElementById('username').value;
            myRoom = document.getElementById('room').value;
            if(myName && myRoom) {
                socket.emit('join', {username: myName, room: myRoom});
                document.getElementById('login').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                document.getElementById('room-title').innerText = "Salon : " + myRoom;
            }
        }

        function startGame() {
            socket.emit('start_game', {room: myRoom});
        }

        function sendAction() {
            const act = document.getElementById('action-input').value;
            socket.emit('submit_action', {room: myRoom, username: myName, action: act});
            document.getElementById('action-input').value = "";
        }

        socket.on('update_players', (data) => {
            document.getElementById('player-list').innerText = "Joueurs : " + data.players.join(', ');
        });

        socket.on('game_started', (data) => {
            updateTurn(data.current_player);
            document.getElementById('start-btn').style.visibility = 'hidden';
        });

        socket.on('new_move', (data) => {
            const log = document.getElementById('log');
            log.innerHTML += `<p><b>${data.player}:</b> ${data.action}</p>`;
            updateTurn(data.next_player);
        });

        function updateTurn(player) {
            const display = document.getElementById('turn-display');
            const btn = document.getElementById('send-btn');
            if(player === myName) {
                display.innerHTML = "<span class='active-turn'>C'EST TON TOUR ! Prends ton temps.</span>";
                btn.disabled = false;
            } else {
                display.innerText = "Tour de : " + player;
                btn.disabled = true;
            }
        }
    </script>
</body>
</html>
